aid: apache-wicket
name: Apache Wicket
description: >-
  Apache Wicket is a component-based web application framework for Java that provides a clean
  separation of markup and logic with a stateful component model. It enables developers to build
  web applications using pure Java and HTML, without XML configuration. Wicket's stateful model
  stores component state on the server side while providing Ajax integration, type-safe page
  parameters, and deep testability. It is maintained by the Apache Software Foundation.
