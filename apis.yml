apis:
  - aid: apache-wicket:apache-wicket-component-api
    name: Apache Wicket Component API
    description: >-
      The Wicket Component API provides the core Java classes for building web UIs. Pages extend
      WebPage, components extend Panel, Form, Link, Button, and other base classes. The model
      system uses IModel<T> for type-safe data binding. The AjaxRequestTarget enables partial
      page updates. Wicket provides built-in components for forms (TextField, DropDownChoice,
      CheckBox), containers (RepeatingView, ListView, DataView), feedback, and navigation.
    humanURL: https://wicket.apache.org/learn/
    tags:
      - Java
      - Components
      - Web Framework
      - Ajax
